# =============================================================
# Quiz-Cap Backend – application.properties
# =============================================================

spring.application.name=quizcap

# ── Database ──────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/quizcap_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
# CHANGE THIS to your MySQL root password (or create a dedicated DB user)
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
# Use 'create' the first time to let Hibernate create tables, then switch to 'validate'.
# Since we use schema.sql for DDL, set this to 'none' after running schema.sql manually.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# ── JWT ───────────────────────────────────────────────────────
# IMPORTANT: Replace this with `openssl rand -base64 32` output in production.
# Must decode to at least 32 bytes for HS256.
jwt.secret=dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBxdWl6Y2Fw
jwt.expiration=86400000

# ── Server ────────────────────────────────────────────────────
server.port=8081

# ── AI / Gemini ───────────────────────────────────────────────
# Get a FREE key at: https://aistudio.google.com/app/apikey
# Leave blank to run without AI (FAQ-only mode)
gemini.api.key=AIzaSyAcKcXWCZE8sXkLSNHnaL-ZQJY-OZ0sDJY

# ── Logging ───────────────────────────────────────────────────
logging.level.com.quizcap=DEBUG
logging.level.org.springframework.security=INFO
